<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #0a0e27 0%, #000000 100%);
    overflow: hidden;
    font-family: 'Arial Black', 'Segoe UI', sans-serif;
  }

  .hologram-container {
    perspective: 1000px;
  }

  .hologram-text {
    font-size: 6rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 4px;
    position: relative;
    color: #ffffff;
    text-align: center;
    transform-style: preserve-3d;
    animation: float 4s ease-in-out infinite, flicker 3s infinite;

    /* Core holographic gradient */
    background: linear-gradient(
      180deg,
      #00fff2 0%,
      #00c2ff 25%,
      #6a00ff 50%,
      #ff00e6 75%,
      #00fff2 100%
    );
    background-size: 100% 300%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;

    /* Layered glow for depth */
    filter: drop-shadow(0 0 10px rgba(0, 255, 242, 0.8))
            drop-shadow(0 0 25px rgba(106, 0, 255, 0.6))
            drop-shadow(0 0 45px rgba(255, 0, 230, 0.4));

    animation: float 4s ease-in-out infinite,
               gradientShift 5s linear infinite,
               flicker 3.5s infinite;
  }

  /* 3D depth layers behind main text (creates the "hologram slab" look) */
  .hologram-text::before,
  .hologram-text::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    background: linear-gradient(180deg, #00fff2, #6a00ff, #ff00e6);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    z-index: -1;
  }

  .hologram-text::before {
    transform: translateZ(-15px);
    opacity: 0.5;
    filter: blur(2px);
  }

  .hologram-text::after {
    transform: translateZ(-30px);
    opacity: 0.25;
    filter: blur(5px);
  }

  /* Scanline overlay for authentic holographic feel */
  .hologram-text::marker { display: none; }

  .scanlines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 255, 242, 0.03) 0px,
      rgba(0, 255, 242, 0.03) 1px,
      transparent 2px,
      transparent 4px
    );
    pointer-events: none;
  }

  @keyframes float {
    0%, 100% { transform: rotateX(8deg) rotateY(-4deg) translateY(0px); }
    50% { transform: rotateX(4deg) rotateY(4deg) translateY(-12px); }
  }

  @keyframes gradientShift {
    0% { background-position: 0% 0%; }
    100% { background-position: 0% 300%; }
  }

  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
    20%, 22%, 24%, 55% { opacity: 0.85; }
  }
</style>
</head>
<body>
  <div class="hologram-container">
    <h1 class="hologram-text" data-text="AI PROJECT CYCLE">AI PROJECT CYCLE</h1>
  </div>
  <div class="scanlines"></div>
</body>
</html>
